<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bytro</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:5173; script-src 'self' 'unsafe-eval' http://localhost:5173; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prevent FOUC: apply theme before React renders
      (function() {
        var stored = localStorage.getItem('bytro-theme') || 'dark';
        var resolved = stored === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : stored;
        document.documentElement.classList.toggle('dark', resolved === 'dark');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
